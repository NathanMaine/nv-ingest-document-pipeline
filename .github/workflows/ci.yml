name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on same branch when a new push lands
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Lint and type-check (one Python version, fast)
  # -------------------------------------------------------------------------
  lint:
    name: lint + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check src/ tests/ examples/

      - name: Run mypy --strict
        run: mypy src/

  # -------------------------------------------------------------------------
  # Test matrix: Python 3.10–3.13 × Ubuntu + macOS
  # -------------------------------------------------------------------------
  test:
    name: test (py${{ matrix.python }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # Note: nv-ingest itself is NOT installed in CI — tests use mocks

      - name: Run pytest with coverage
        run: pytest tests/ --cov=src --cov-branch --cov-report=term-missing

  # -------------------------------------------------------------------------
  # Coverage gate (one Python version, posts a single report)
  # -------------------------------------------------------------------------
  coverage:
    name: coverage gate (95% min)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run coverage and enforce 95% minimum
        run: |
          pytest tests/ --cov=src --cov-branch --cov-fail-under=95
